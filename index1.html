<div id="videoModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center;">

<script>
    function openModal(videoSrc) {
        document.getElementById('videoModal').style.display = 'flex';
        document.getElementById('modalVideo').src = videoSrc;
    }
    function closeModal() {
        document.getElementById('videoModal').style.display = 'none';
        document.getElementById('modalVideo').pause();
    }
    const videoId = "video-123"; // یه شناسه یکتا برای هر ویدیو

// خواندن و نمایش تعداد لایک‌ها
const likeRef = database.ref('videos/' + videoId + '/likes');
likeRef.on('value', (snapshot) => {
  document.getElementById('likeCount').innerText = snapshot.val() || 0;
});

// دکمه لایک
document.getElementById('likeBtn').addEventListener('click', () => {
  const userLiked = localStorage.getItem('liked_' + videoId);
  if (userLiked) {
    alert('قبلاً لایک کردی!');
    return;
  }
  likeRef.transaction((current) => (current || 0) + 1);
  localStorage.setItem('liked_' + videoId, 'true');
  // اگه خواستی با لاگین کاربر واقعی کنی، از Firebase Auth استفاده کن
});

// بازدید (هر بار که صفحه لود بشه، یک بار اضافه کن)
const viewRef = database.ref('videos/' + videoId + '/views');
viewRef.transaction((current) => (current || 0) + 1);
viewRef.on('value', (snapshot) => {
  document.getElementById('viewCount').innerText = snapshot.val() || 0;
});
</script>
